<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajanta Digital Clock</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@2.1.0/css/dseg.min.css">
    
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

       
        #clock-case {
            background-color: #ffffff; 
            padding: 40px;
            border: 2px solid #bbb;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

       
        #div1 {
            background-color: #7a8a94; 
            padding: 30px;
            border: 10px solid #5a6a74;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lcd-screen {
            background-color: #93b0ca; 
            padding: 20px;
            border: 5px solid #444;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
            width: 400px;
        }

        h1 {
            font-family: 'DSEG7-Classic', sans-serif;
            font-style: italic;
            margin: 0;
            color: #1a1a1a;
            line-height: 1;
        }

        #display {
            font-size: 85px;
            margin-bottom: 20px;
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-top: 2px solid rgba(0,0,0,0.2);
            padding-top: 15px;
        }

        .label {
            font-size: 10px;
            /* text-transform: uppercase; */
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .info-box {
            text-align: center;
        }

        #daydisplay, #datedisplay {
            font-size: 30px;
        }

        .brand-name {
            color: white;
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Times New Roman', serif;
        }
    </style>
</head>
<body>
    
    <!-- <div id="clock-case"> -->
        <!-- <div id="div1"> -->
            <div class="lcd-screen">
                <h1 id="display">00:00:00</h1>
                
                <div class="bottom-row">
                    <div class="info-box">
                        <span class="label">Date / Month</span>
                        <h1 id="datedisplay">00/00</h1>
                    </div>

                    <div class="info-box">
                        <span class="label">Day</span>
                        <h1 id="daydisplay">SUN</h1>
                    </div>
                </div>
            </div>
            
            <div class="brand-name">Ajanta <small style="font-size: 8px;">QUARTZ</small></div>
        <!-- </div> -->
    <!-- </div> -->

    <script src="./digital_clock.js"></script>
</body>
</html>
